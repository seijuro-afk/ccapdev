<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimoBuzz - Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/home_styles.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark sticky-top p-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">AnimoBuzz</a>
            <form class="d-flex">
                <input class="form-control me-2" type="search" placeholder="Search...">
                <button class="btn btn-success" type="submit">Search</button>
            </form>
            <div id="authButtonContainer"></div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <div class="col-md-3 d-none d-md-block">
                <div class="list-group">
                    <a href="../html/homepage.html" class="list-group-item list-group-item-action active">Home</a>
                    <a href="../html/fyp.html" class="list-group-item list-group-item-action">For You</a>
                    <a href="../html/user-profile.html" class="list-group-item list-group-item-action">Profile</a>
                    <a href="../html/communities.html" class="list-group-item list-group-item-action">Communities</a>
                </div>                
            </div>

            <div class="col-md-6">
                <div class="mb-3">
                    <label for="sortDropdown" class="form-label">Sort Posts:</label>
                    <select id="sortDropdown" class="form-select">
                        <option value="oldest">Oldest to Latest</option>
                        <option value="latest">Latest to Oldest</option>
                    </select>
                </div>

                <div class="card mb-3" id="postCreation">
                    <div class="card-body">
                        <textarea class="form-control" placeholder="What's buzzing?" rows="3"></textarea>
                        <button class="btn btn-success mt-2 w-100">Post</button>
                    </div>
                </div>

                <div id="postList">
                    <!-- Posts will be dynamically rendered here -->
                </div>
            </div>

            <div class="col-md-3 d-none d-md-block">
                <div class="card">
                    <div class="card-header bg-success text-white">Trending Topics</div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">#BeeLine</li>
                        <li class="list-group-item">#AnimoBuzz</li>
                        <li class="list-group-item">#LatestNews</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/home_script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
